<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NutriLab Store</title>

  <link rel="stylesheet" href="/styles/main.css" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="topbar">
    <div class="brandBox">
      <div class="logo"></div>

      <div class="brandText">
        <div class="brandTitle">NutriLab Store</div>
        <div class="brandSub">Premium Supplements</div>
      </div>
    </div>

    <div class="searchWrap">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="M20 20l-3.5-3.5"></path>
      </svg>
      <input id="searchInput" type="text" placeholder="Поиск товара..." />
    </div>
  </header>

  <div class="chips" id="chips"></div>

  <main class="page">
    <section id="screen-home" class="screen active">
      <div class="sectionHead">
        <h1>Главная</h1>
        <p>Подборка товаров NutriLab</p>
      </div>
      <div id="homeGrid" class="grid"></div>
    </section>

    <section id="screen-catalog" class="screen">
      <div class="sectionHead">
        <h1>Каталог</h1>
        <p>Все доступные товары</p>
      </div>
      <div id="catalogGrid" class="grid"></div>
    </section>

    <section id="screen-cart" class="screen">
      <div class="sectionHead">
        <h1>Корзина</h1>
        <p>Твои выбранные товары</p>
      </div>

      <div id="cartList" class="cartList"></div>
      <div id="cartSummary" class="cartSummary hidden"></div>
    </section>

    <section id="screen-profile" class="screen">
      <div class="sectionHead">
        <h1>Профиль</h1>
        <p>Информация покупателя</p>
      </div>

      <div class="profileCard">
        <div class="profileTop">
          <div class="profileAvatar" id="profileAvatar">N</div>
          <div>
            <div class="profileName" id="userName">Гость</div>
            <div class="profileSub" id="userId">Открыто вне Telegram</div>
          </div>
        </div>

        <div class="profileStats">
          <div class="statRow">
            <span>Избранное</span>
            <span id="favCount">0</span>
          </div>
          <div class="statRow">
            <span>Товаров в корзине</span>
            <span id="cartCount">0</span>
          </div>
          <div class="statRow">
            <span>Выбрана категория</span>
            <span id="profileCategory">Все</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottomNav">
    <button class="navBtn active" data-tab="home" aria-label="Главная">
      <svg viewBox="0 0 24 24">
        <path d="M3 10.5L12 3l9 7.5"></path>
        <path d="M5 9.5V20h14V9.5"></path>
      </svg>
    </button>

    <button class="navBtn" data-tab="catalog" aria-label="Каталог">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="7" height="7" rx="2"></rect>
        <rect x="14" y="4" width="7" height="7" rx="2"></rect>
        <rect x="3" y="14" width="7" height="7" rx="2"></rect>
        <rect x="14" y="14" width="7" height="7" rx="2"></rect>
      </svg>
    </button>

    <button class="navBtn" data-tab="cart" aria-label="Корзина">
      <svg viewBox="0 0 24 24">
        <circle cx="9" cy="20" r="1.7"></circle>
        <circle cx="18" cy="20" r="1.7"></circle>
        <path d="M3 4h2l2.2 10h10.8L21 7H7"></path>
      </svg>
      <span id="cartBadge" class="badgeDot hidden">0</span>
    </button>

    <button class="navBtn" data-tab="profile" aria-label="Профиль">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 21c2-4 5-6 8-6s6 2 8 6"></path>
      </svg>
    </button>
  </nav>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
