<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriLab Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.center{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-box{
background:#1e293b;
padding:30px;
border-radius:14px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
margin-bottom:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
width:100%;
cursor:pointer;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

.product{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

.product img{
width:100px;
border-radius:10px;
margin-top:10px;
}

.delete{
background:#ef4444;
margin-top:10px;
}

</style>
</head>

<body>

<div id="login" class="center">

<div class="login-box">

<h2>Admin Login</h2>

<input type="password" id="password" placeholder="Введите пароль">

<button onclick="login()">Войти</button>

</div>

</div>


<div id="admin" style="display:none">

<div class="container">

<h1>NutriLab Admin</h1>

<div class="card">

<h2>Добавить товар</h2>

<input id="name" placeholder="Название товара">

<input id="price" placeholder="Цена">

<textarea id="description" placeholder="Описание"></textarea>

<input id="photo" type="file">

<button onclick="addProduct()">Добавить</button>

</div>

<div class="card">

<h2>Все товары</h2>

<div id="products"></div>

</div>

</div>

</div>


<script>

const PASSWORD = "abdul2008"

function login(){

const pass = document.getElementById("password").value

if(pass === PASSWORD){

document.getElementById("login").style.display="none"
document.getElementById("admin").style.display="block"

loadProducts()

}else{

alert("Неверный пароль")

}

}

const supabaseUrl = "https://cthfqhxnplyibdsjzcrq.supabase.co"
const supabaseKey = "sb_publishable_AjGX1zKhV8kEyGMbvAKwQg_srda-oyI"

const { createClient } = window.supabase

const supabase = createClient(supabaseUrl,supabaseKey)

async function uploadImage(file){

const fileName = Date.now()+"_"+file.name

await supabase
.storage
.from("product-images")
.upload(fileName,file)

const { data } = supabase
.storage
.from("product-images")
.getPublicUrl(fileName)

return data.publicUrl

}

async function addProduct(){

const name=document.getElementById("name").value
const price=document.getElementById("price").value
const description=document.getElementById("description").value
const file=document.getElementById("photo").files[0]

let image_url=""

if(file){

image_url=await uploadImage(file)

}

await supabase
.from("products")
.insert([{name,price,description,image_url}])

loadProducts()

}

async function deleteProduct(id){

await supabase
.from("products")
.delete()
.eq("id",id)

loadProducts()

}

async function loadProducts(){

const { data } = await supabase
.from("products")
.select("*")
.order("id",{ascending:false})

const container=document.getElementById("products")

container.innerHTML=""

data.forEach(p=>{

container.innerHTML+=`

<div class="product">

<b>${p.name}</b> — ${p.price} ₽

<p>${p.description}</p>

<img src="${p.image_url}">

<br>

<button class="delete" onclick="deleteProduct(${p.id})">Удалить</button>

</div>

`

})

}

</script>

</body>
</html>
