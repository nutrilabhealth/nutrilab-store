<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriLab Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1433;
      color: white;
    }

    .center {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .login-box,
    .card,
    .modal-box {
      width: 100%;
      max-width: 760px;
      background: #1f2a45;
      border-radius: 20px;
      padding: 24px;
      box-sizing: border-box;
    }

    .login-box {
      max-width: 360px;
      text-align: center;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 10px;
      margin-bottom: 14px;
      border: none;
      border-radius: 14px;
      background: #e5e7eb;
      color: #111827;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #67c368;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .page {
      display: none;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .error {
      margin-top: 10px;
      min-height: 20px;
      color: #ffb4b4;
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      min-height: 20px;
      color: #dbe4ff;
      font-size: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-box {
      background: #111b36;
      border-radius: 16px;
      padding: 18px;
    }

    .stat-label {
      color: #c7d2fe;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .product {
      background: #1f2a45;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 110px;
    }

    .delete-btn {
      width: 110px;
      padding: 10px 14px;
      font-size: 14px;
      background: #ef4444;
    }

    .edit-btn {
      width: 110px;
      padding: 10px 14px;
      font-size: 14px;
      background: #3b82f6;
    }

    .copy-btn {
      width: auto;
      padding: 8px 12px;
      font-size: 13px;
      background: #475569;
      margin-top: 8px;
    }

    .mini-btn {
      width: auto;
      padding: 10px 12px;
      font-size: 14px;
      background: #3b82f6;
      margin-bottom: 12px;
    }

    .product img,
    .preview {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      background: #111827;
    }

    .preview {
      display: none;
      margin-bottom: 12px;
    }

    .muted {
      color: #c7d2fe;
      font-size: 13px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      padding: 20px;
      box-sizing: border-box;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal-box {
      max-width: 520px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .secondary {
      background: #475569;
    }

    .article-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .article-row input {
      margin-bottom: 14px;
    }

    @media (max-width: 700px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .row {
        flex-direction: column;
      }

      .actions {
        width: 100%;
        min-width: 100%;
      }

      .edit-btn,
      .delete-btn {
        width: 100%;
      }

      .article-row {
        flex-direction: column;
        align-items: stretch;
      }

      .mini-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div id="loginScreen" class="center">
    <div class="login-box">
      <h2>Admin Login</h2>
      <input id="password" type="password" placeholder="Введите пароль" />
      <button id="loginBtn" type="button">Войти</button>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <div id="adminPage" class="page">
    <h1>NutriLab Admin</h1>

    <div class="card">
      <h2>Статистика</h2>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Товаров</div>
          <div id="statTotal" class="stat-value">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">С фото</div>
          <div id="statWithPhoto" class="stat-value">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Средняя цена</div>
          <div id="statAvgPrice" class="stat-value">0 ₽</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Добавить товар</h2>

      <input id="name" placeholder="Название товара" />

      <div class="article-row">
        <input id="article" placeholder="Артикул товара" />
        <button id="generateArticleBtn" class="mini-btn" type="button">Сгенерировать</button>
      </div>

      <input id="price" type="number" placeholder="Цена" />
      <textarea id="description" placeholder="Описание"></textarea>
      <input id="photo" type="file" accept="image/*" />
      <img id="preview" class="preview" alt="preview" />

      <button id="addBtn" type="button">Добавить</button>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <h2>Поиск по артикулу</h2>
      <input id="searchArticle" placeholder="Введите артикул, например NUTRI-48321" />
      <div id="searchStatus" class="status"></div>
    </div>

    <div class="card">
      <h2>Все товары</h2>
      <div id="products">Загрузка...</div>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-box">
      <h3>Редактировать товар</h3>

      <input id="editName" placeholder="Название товара" />

      <div class="article-row">
        <input id="editArticle" placeholder="Артикул товара" />
        <button id="generateEditArticleBtn" class="mini-btn" type="button">Сгенерировать</button>
      </div>

      <input id="editPrice" type="number" placeholder="Цена" />
      <textarea id="editDescription" placeholder="Описание"></textarea>
      <input id="editPhoto" type="file" accept="image/*" />
      <img id="editPreview" class="preview" alt="edit-preview" style="display:block;" />

      <div class="modal-actions">
        <button id="saveEditBtn" type="button">Сохранить</button>
        <button id="cancelEditBtn" type="button" class="secondary">Отмена</button>
      </div>

      <div id="editStatus" class="status"></div>
    </div>
  </div>

  <script>
    var PASSWORD = "abdul2008";

    var supabaseUrl = "https://cthfqhxnplyibdsjzcrq.supabase.co";
    var supabaseKey = "sb_publishable_AjGX1zKhV8kEyGMbvAKwQg_srda-oyI";
    var supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    var loginScreen = document.getElementById("loginScreen");
    var adminPage = document.getElementById("adminPage");
    var loginBtn = document.getElementById("loginBtn");
    var passwordInput = document.getElementById("password");
    var loginError = document.getElementById("loginError");

    var addBtn = document.getElementById("addBtn");
    var photoInput = document.getElementById("photo");
    var preview = document.getElementById("preview");
    var statusEl = document.getElementById("status");

    var searchArticleInput = document.getElementById("searchArticle");
    var searchStatusEl = document.getElementById("searchStatus");

    var generateArticleBtn = document.getElementById("generateArticleBtn");
    var generateEditArticleBtn = document.getElementById("generateEditArticleBtn");

    var statTotal = document.getElementById("statTotal");
    var statWithPhoto = document.getElementById("statWithPhoto");
    var statAvgPrice = document.getElementById("statAvgPrice");

    var editModal = document.getElementById("editModal");
    var editName = document.getElementById("editName");
    var editArticle = document.getElementById("editArticle");
    var editPrice = document.getElementById("editPrice");
    var editDescription = document.getElementById("editDescription");
    var editPhoto = document.getElementById("editPhoto");
    var editPreview = document.getElementById("editPreview");
    var editStatus = document.getElementById("editStatus");
    var saveEditBtn = document.getElementById("saveEditBtn");
    var cancelEditBtn = document.getElementById("cancelEditBtn");

    var currentEditId = null;
    var currentEditImageUrl = "";

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setEditStatus(text) {
      editStatus.textContent = text;
    }

    function setSearchStatus(text) {
      searchStatusEl.textContent = text;
    }

    function showCopiedMessage(target, text) {
      var old = target.textContent;
      target.textContent = text;
      setTimeout(function () {
        target.textContent = old;
      }, 1000);
    }

    function generateArticle(prefix) {
      var randomPart = Math.floor(10000 + Math.random() * 90000);
      return prefix + "-" + randomPart;
    }

    function login() {
      var pass = passwordInput.value.trim();

      if (pass === PASSWORD) {
        loginError.textContent = "";
        loginScreen.style.display = "none";
        adminPage.style.display = "block";
        loadProducts();
      } else {
        loginError.textContent = "Неверный пароль";
        passwordInput.value = "";
      }
    }

    loginBtn.addEventListener("click", login);
    passwordInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") login();
    });

    generateArticleBtn.addEventListener("click", function () {
      document.getElementById("article").value = generateArticle("NUTRI");
      setStatus("✅ Артикул сгенерирован");
    });

    generateEditArticleBtn.addEventListener("click", function () {
      editArticle.value = generateArticle("NUTRI");
      setEditStatus("✅ Артикул сгенерирован");
    });

    photoInput.addEventListener("change", function () {
      var file = photoInput.files[0];
      if (!file) {
        preview.style.display = "none";
        preview.src = "";
        return;
      }
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
    });

    editPhoto.addEventListener("change", function () {
      var file = editPhoto.files[0];
      if (!file) return;
      editPreview.src = URL.createObjectURL(file);
      editPreview.style.display = "block";
    });

    searchArticleInput.addEventListener("input", function () {
      loadProducts(searchArticleInput.value.trim());
    });

    async function uploadImage(file) {
      var ext = file.name.split(".").pop() || "jpg";
      var fileName = Date.now() + "_" + Math.random().toString(36).slice(2) + "." + ext;

      var uploadResult = await supabase
        .storage
        .from("product-images")
        .upload(fileName, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type || "image/jpeg"
        });

      if (uploadResult.error) {
        throw new Error("Ошибка загрузки фото: " + uploadResult.error.message);
      }

      var publicResult = supabase
        .storage
        .from("product-images")
        .getPublicUrl(fileName);

      return publicResult.data.publicUrl;
    }

    async function addProduct() {
      try {
        var name = document.getElementById("name").value.trim();
        var article = document.getElementById("article").value.trim();
        var price = document.getElementById("price").value.trim();
        var description = document.getElementById("description").value.trim();
        var file = photoInput.files[0];

        if (!name || !article || !price) {
          setStatus("Заполни название, артикул и цену.");
          return;
        }

        addBtn.disabled = true;
        setStatus("Загрузка...");

        var image_url = "";

        if (file) {
          image_url = await uploadImage(file);
        }

        var insertResult = await supabase
          .from("products")
          .insert([
            {
              name: name,
              article: article,
              price: Number(price),
              description: description,
              image_url: image_url
            }
          ]);

        if (insertResult.error) {
          throw new Error("Ошибка добавления: " + insertResult.error.message);
        }

        document.getElementById("name").value = "";
        document.getElementById("article").value = "";
        document.getElementById("price").value = "";
        document.getElementById("description").value = "";
        photoInput.value = "";
        preview.src = "";
        preview.style.display = "none";

        setStatus("✅ Товар добавлен");
        await loadProducts(searchArticleInput.value.trim());
      } catch (err) {
        setStatus("❌ " + err.message);
      } finally {
        addBtn.disabled = false;
      }
    }

    addBtn.addEventListener("click", addProduct);

    async function deleteProduct(id) {
      var ok = confirm("Удалить товар?");
      if (!ok) return;

      var delResult = await supabase
        .from("products")
        .delete()
        .eq("id", id);

      if (delResult.error) {
        alert("Ошибка удаления: " + delResult.error.message);
        return;
      }

      loadProducts(searchArticleInput.value.trim());
    }

    function openEditModal(product) {
      currentEditId = product.id;
      currentEditImageUrl = product.image_url || "";

      editName.value = product.name || "";
      editArticle.value = product.article || "";
      editPrice.value = product.price || "";
      editDescription.value = product.description || "";
      editPhoto.value = "";
      editPreview.src = currentEditImageUrl || "";
      editPreview.style.display = currentEditImageUrl ? "block" : "none";
      setEditStatus("");

      editModal.style.display = "flex";
    }

    function closeEditModal() {
      editModal.style.display = "none";
      currentEditId = null;
      currentEditImageUrl = "";
      editPhoto.value = "";
      setEditStatus("");
    }

    cancelEditBtn.addEventListener("click", closeEditModal);

    saveEditBtn.addEventListener("click", async function () {
      try {
        if (!currentEditId) return;

        saveEditBtn.disabled = true;
        setEditStatus("Сохранение...");

        var newName = editName.value.trim();
        var newArticle = editArticle.value.trim();
        var newPrice = editPrice.value.trim();
        var newDescription = editDescription.value.trim();
        var newFile = editPhoto.files[0];
        var imageUrl = currentEditImageUrl;

        if (!newName || !newArticle || !newPrice) {
          setEditStatus("Заполни название, артикул и цену.");
          return;
        }

        if (newFile) {
          imageUrl = await uploadImage(newFile);
        }

        var updateResult = await supabase
          .from("products")
          .update({
            name: newName,
            article: newArticle,
            price: Number(newPrice),
            description: newDescription,
            image_url: imageUrl
          })
          .eq("id", currentEditId);

        if (updateResult.error) {
          throw new Error("Ошибка обновления: " + updateResult.error.message);
        }

        setEditStatus("✅ Сохранено");
        await loadProducts(searchArticleInput.value.trim());
        setTimeout(closeEditModal, 500);
      } catch (err) {
        setEditStatus("❌ " + err.message);
      } finally {
        saveEditBtn.disabled = false;
      }
    });

    async function copyArticle(article, buttonElement) {
      try {
        await navigator.clipboard.writeText(article || "");
        showCopiedMessage(buttonElement, "Скопировано");
      } catch (e) {
        alert("Не удалось скопировать");
      }
    }

    function updateStats(products) {
      var total = products.length;
      var withPhoto = products.filter(function (p) {
        return !!p.image_url;
      }).length;

      var totalPrice = products.reduce(function (sum, p) {
        return sum + (Number(p.price) || 0);
      }, 0);

      var avg = total > 0 ? Math.round(totalPrice / total) : 0;

      statTotal.textContent = total;
      statWithPhoto.textContent = withPhoto;
      statAvgPrice.textContent = avg + " ₽";
    }

    window.deleteProduct = deleteProduct;

    async function loadProducts(articleQuery) {
      var container = document.getElementById("products");

      var statsResult = await supabase
        .from("products")
        .select("*");

      if (!statsResult.error && statsResult.data) {
        updateStats(statsResult.data);
      }

      var query = supabase
        .from("products")
        .select("*")
        .order("id", { ascending: false });

      if (articleQuery) {
        query = query.ilike("article", "%" + articleQuery + "%");
        setSearchStatus("Поиск по артикулу: " + articleQuery);
      } else {
        setSearchStatus("");
      }

      var result = await query;

      if (result.error) {
        container.textContent = "Ошибка загрузки товаров: " + result.error.message;
        return;
      }

      if (!result.data || result.data.length === 0) {
        container.textContent = "Товаров не найдено.";
        return;
      }

      container.innerHTML = "";

      result.data.forEach(function (p) {
        var card = document.createElement("div");
        card.className = "product";

        var row = document.createElement("div");
        row.className = "row";

        var left = document.createElement("div");
        left.innerHTML =
          "<b>" + (p.name || "Без названия") + "</b> — " + (p.price || 0) + " ₽" +
          "<p>" + (p.description || "") + "</p>" +
          "<div class='muted'>Артикул: " + (p.article || "—") + "</div>" +
          "<div class='muted'>ID: " + p.id + "</div>";

        var copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.textContent = "Копировать артикул";
        copyBtn.onclick = function () {
          copyArticle(p.article || "", copyBtn);
        };
        left.appendChild(copyBtn);

        var actions = document.createElement("div");
        actions.className = "actions";

        var editBtn = document.createElement("button");
        editBtn.className = "edit-btn";
        editBtn.textContent = "Редактировать";
        editBtn.onclick = function () {
          openEditModal(p);
        };

        var delBtn = document.createElement("button");
        delBtn.className = "delete-btn";
        delBtn.textContent = "Удалить";
        delBtn.onclick = function () {
          deleteProduct(p.id);
        };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        row.appendChild(left);
        row.appendChild(actions);
        card.appendChild(row);

        if (p.image_url) {
          var img = document.createElement("img");
          img.src = p.image_url;
          img.alt = p.name || "product";
          card.appendChild(img);
        }

        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
