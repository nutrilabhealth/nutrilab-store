<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriLab Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1433;
      color: white;
    }

    .center {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .login-box,
    .card {
      background: #1e2a45;
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
      width: 100%;
      max-width: 760px;
    }

    .login-box {
      max-width: 360px;
      text-align: center;
    }

    h1, h2 {
      margin-top: 0;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border: none;
      border-radius: 14px;
      margin-top: 10px;
      margin-bottom: 14px;
      font-size: 16px;
      background: #e5e7eb;
      color: #111827;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      background: #60c467;
      color: white;
    }

    .error {
      min-height: 22px;
      margin-top: 10px;
      color: #ffb4b4;
      font-size: 14px;
    }

    .page {
      display: none;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .product {
      background: #1e2a45;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .product img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      background: #101827;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .delete-btn {
      width: auto;
      padding: 10px 14px;
      font-size: 14px;
      background: #ef4444;
    }

    .status {
      margin-top: 10px;
      min-height: 22px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .preview {
      display: none;
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      margin: 6px 0 12px;
      background: #101827;
    }
  </style>
</head>
<body>

  <div id="loginScreen" class="center">
    <div class="login-box">
      <h2>Admin Login</h2>

      <form id="loginForm">
        <input
          type="password"
          id="password"
          placeholder="Введите пароль"
          autocomplete="current-password"
        />
        <button type="submit">Войти</button>
      </form>

      <div id="loginError" class="error"></div>
    </div>
  </div>

  <div id="adminPage" class="page">
    <h1>NutriLab Admin</h1>

    <div class="card">
      <h2>Добавить товар</h2>

      <input id="name" placeholder="Название товара" />
      <input id="price" type="number" placeholder="Цена" />
      <textarea id="description" placeholder="Описание"></textarea>
      <input id="photo" type="file" accept="image/*" />
      <img id="preview" class="preview" alt="preview" />

      <button id="addBtn" type="button">Добавить</button>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <h2>Все товары</h2>
      <div id="products">Загрузка...</div>
    </div>
  </div>

  <script>
    const PASSWORD = "abdul2008";

    const supabaseUrl = "https://cthfqhxnplyibdsjzcrq.supabase.co";
    const supabaseKey = "sb_publishable_AjGX1zKhV8kEyGMbvAKwQg_srda-oyI";

    const { createClient } = window.supabase;
    const supabase = createClient(supabaseUrl, supabaseKey);

    const loginForm = document.getElementById("loginForm");
    const passwordInput = document.getElementById("password");
    const loginError = document.getElementById("loginError");
    const loginScreen = document.getElementById("loginScreen");
    const adminPage = document.getElementById("adminPage");

    const photoInput = document.getElementById("photo");
    const preview = document.getElementById("preview");
    const addBtn = document.getElementById("addBtn");
    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    photoInput.addEventListener("change", () => {
      const file = photoInput.files[0];
      if (!file) {
        preview.style.display = "none";
        preview.src = "";
        return;
      }
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const pass = passwordInput.value.trim();

      if (pass !== PASSWORD) {
        loginError.textContent = "Неверный пароль";
        passwordInput.value = "";
        return;
      }

      loginError.textContent = "";
      loginScreen.style.display = "none";
      adminPage.style.display = "block";

      await loadProducts();
    });

    async function uploadImage(file) {
      const ext = file.name.split(".").pop() || "jpg";
      const fileName = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

      const { error: uploadError } = await supabase
        .storage
        .from("product-images")
        .upload(fileName, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type || "image/jpeg"
        });

      if (uploadError) {
        throw new Error("Ошибка загрузки фото: " + uploadError.message);
      }

      const { data } = supabase
        .storage
        .from("product-images")
        .getPublicUrl(fileName);

      return data.publicUrl;
    }

    async function addProduct() {
      try {
        const name = document.getElementById("name").value.trim();
        const price = document.getElementById("price").value.trim();
        const description = document.getElementById("description").value.trim();
        const file = photoInput.files[0];

        if (!name || !price) {
          setStatus("Заполни название и цену.");
          return;
        }

        addBtn.disabled = true;
        setStatus("Загрузка...");

        let image_url = "";

        if (file) {
          image_url = await uploadImage(file);
        }

        const { error } = await supabase
          .from("products")
          .insert([
            {
              name,
              price: Number(price),
              description,
              image_url
            }
          ]);

        if (error) {
          throw new Error("Ошибка добавления: " + error.message);
        }

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("description").value = "";
        photoInput.value = "";
        preview.src = "";
        preview.style.display = "none";

        setStatus("✅ Товар добавлен");
        await loadProducts();
      } catch (err) {
        setStatus("❌ " + err.message);
      } finally {
        addBtn.disabled = false;
      }
    }

    async function deleteProduct(id) {
      const ok = confirm("Удалить товар?");
      if (!ok) return;

      const { error } = await supabase
        .from("products")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Ошибка удаления: " + error.message);
        return;
      }

      await loadProducts();
    }

    async function loadProducts() {
      const container = document.getElementById("products");

      const { data, error } = await supabase
        .from("products")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        container.innerHTML = "Ошибка загрузки товаров: " + error.message;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = "Товаров пока нет.";
        return;
      }

      container.innerHTML = "";

      data.forEach((p) => {
        const img = p.image_url
          ? `<img src="${p.image_url}" alt="${p.name || "product"}">`
          : "";

        container.innerHTML += `
          <div class="product">
            <div class="row">
              <div>
                <b>${p.name || "Без названия"}</b> — ${p.price || 0} ₽
                <p>${p.description || ""}</p>
              </div>
              <button class="delete-btn" onclick="deleteProduct(${p.id})">Удалить</button>
            </div>
            ${img}
          </div>
        `;
      });
    }

    addBtn.addEventListener("click", addProduct);
    window.deleteProduct = deleteProduct;
  </script>
</body>
</html>
