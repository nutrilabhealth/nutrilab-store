<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriLab Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
font-size:22px;
font-weight:bold;
background:#111827;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

input,textarea{
width:100%;
box-sizing:border-box;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:none;
background:#e5e7eb;
color:#111827;
font-size:16px;
}

button{
padding:12px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
font-size:15px;
}

.add{
background:#22c55e;
color:white;
width:100%;
}

.delete{
background:#ef4444;
color:white;
}

.product{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

.product img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
}

.status{
margin-top:10px;
color:#cbd5e1;
}

</style>
</head>

<body>

<header>NutriLab Admin</header>

<div class="container">

<div class="card">

<h2>Добавить товар</h2>

<input id="name" placeholder="Название товара">

<input id="price" placeholder="Цена">

<textarea id="description" placeholder="Описание"></textarea>

<input id="photo" type="file">

<button class="add" onclick="addProduct()">Добавить</button>

<div class="status" id="status"></div>

</div>

<div class="card">

<h2>Все товары</h2>

<div id="products"></div>

</div>

</div>

<script>

/* ПАРОЛЬ АДМИНКИ */

const ADMIN_PASSWORD = "abdul2008"

const input = prompt("Введите пароль администратора")

if(input !== ADMIN_PASSWORD){

document.body.innerHTML = "<h1 style='text-align:center;margin-top:40vh;'>Нет доступа</h1>"

throw new Error("Access denied")

}

/* SUPABASE */

const supabaseUrl = "https://cthfqhxnplyibdsjzcrq.supabase.co"

const supabaseKey = "sb_publishable_AjGX1zKhV8kEyGMbvAKwQg_srda-oyI"

const { createClient } = window.supabase

const supabase = createClient(supabaseUrl,supabaseKey)

/* ЗАГРУЗКА ТОВАРОВ */

async function loadProducts(){

const container = document.getElementById("products")

const { data,error } = await supabase
.from("products")
.select("*")
.order("id",{ascending:false})

if(error){

container.innerHTML="Ошибка загрузки"

return

}

container.innerHTML=""

data.forEach(p=>{

container.innerHTML += `

<div class="product">

<b>${p.name}</b> — ${p.price} ₽

<p>${p.description}</p>

<img src="${p.image_url}">

<br><br>

<button class="delete" onclick="deleteProduct(${p.id})">Удалить</button>

</div>

`

})

}

/* ЗАГРУЗКА ФОТО */

async function uploadImage(file){

const fileName = Date.now()+"_"+file.name

const { error } = await supabase
.storage
.from("product-images")
.upload(fileName,file)

if(error){

throw new Error("Ошибка загрузки фото")

}

const { data } = supabase
.storage
.from("product-images")
.getPublicUrl(fileName)

return data.publicUrl

}

/* ДОБАВЛЕНИЕ ТОВАРА */

async function addProduct(){

const name = document.getElementById("name").value
const price = document.getElementById("price").value
const description = document.getElementById("description").value
const file = document.getElementById("photo").files[0]

let image_url=""

if(file){

image_url = await uploadImage(file)

}

const { error } = await supabase
.from("products")
.insert([
{
name,
price,
description,
image_url
}
])

if(error){

alert("Ошибка добавления")

return

}

document.getElementById("name").value=""
document.getElementById("price").value=""
document.getElementById("description").value=""
document.getElementById("photo").value=""

loadProducts()

}

/* УДАЛЕНИЕ */

async function deleteProduct(id){

if(!confirm("Удалить товар?")) return

await supabase
.from("products")
.delete()
.eq("id",id)

loadProducts()

}

loadProducts()

</script>

</body>
</html>
