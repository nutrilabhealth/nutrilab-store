<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriLab Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      background: #111827;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      background: #e5e7eb;
      color: #111827;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .add-btn {
      background: #22c55e;
      color: white;
      width: 100%;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .product {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .product-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .product img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
      margin-top: 10px;
      background: #0b1220;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
    }

    .preview {
      display: none;
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      margin: 10px 0 12px;
      background: #0b1220;
    }
  </style>
</head>
<body>
  <header>NutriLab Admin Panel</header>

  <div class="container">
    <div class="card">
      <h2>Добавить товар</h2>

      <input id="name" placeholder="Название товара" />
      <input id="price" type="number" placeholder="Цена" />
      <textarea id="description" placeholder="Описание"></textarea>

      <label for="photoFile">Фото товара</label>
      <input id="photoFile" type="file" accept="image/*" />
      <img id="preview" class="preview" alt="preview" />

      <button class="add-btn" id="addBtn" onclick="addProduct()">Добавить</button>
      <div class="status" id="status"></div>
    </div>

    <div class="card">
      <h2>Все товары</h2>
      <div id="products">Загрузка...</div>
    </div>
  </div>

  <script>
    const supabaseUrl = "https://cthfqhxnplyibdsjzcrq.supabase.co";
    const supabaseKey = "sb_publishable_AjGX1zKhV8kEyGMbvAKwQg_srda-oyI";

    const { createClient } = window.supabase;
    const client = createClient(supabaseUrl, supabaseKey);

    const statusEl = document.getElementById("status");
    const previewEl = document.getElementById("preview");
    const photoInput = document.getElementById("photoFile");
    const addBtn = document.getElementById("addBtn");

    photoInput.addEventListener("change", () => {
      const file = photoInput.files[0];
      if (!file) {
        previewEl.style.display = "none";
        previewEl.src = "";
        return;
      }
      const url = URL.createObjectURL(file);
      previewEl.src = url;
      previewEl.style.display = "block";
    });

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function loadProducts() {
      const container = document.getElementById("products");

      const { data, error } = await client
        .from("products")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        container.innerHTML = "Ошибка загрузки товаров: " + error.message;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = "Товаров пока нет.";
        return;
      }

      container.innerHTML = "";

      data.forEach((p) => {
        const image = p.image_url
          ? `<img src="${p.image_url}" alt="${p.name || "product"}" />`
          : "";

        container.innerHTML += `
          <div class="product">
            <div class="product-top">
              <div>
                <strong>${p.name || "Без названия"}</strong> — ${p.price || 0} ₽
                <p>${p.description || ""}</p>
                <div class="muted">ID: ${p.id}</div>
              </div>
              <button class="delete-btn" onclick="deleteProduct(${p.id})">Удалить</button>
            </div>
            ${image}
          </div>
        `;
      });
    }

    async function uploadImage(file) {
      const ext = file.name.split(".").pop() || "jpg";
      const fileName = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

      const { error: uploadError } = await client
        .storage
        .from("product-images")
        .upload(fileName, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type || "image/jpeg"
        });

      if (uploadError) {
        throw new Error("Ошибка загрузки фото: " + uploadError.message);
      }

      const { data } = client
        .storage
        .from("product-images")
        .getPublicUrl(fileName);

      return data.publicUrl;
    }

    async function addProduct() {
      try {
        const name = document.getElementById("name").value.trim();
        const price = document.getElementById("price").value.trim();
        const description = document.getElementById("description").value.trim();
        const file = photoInput.files[0];

        if (!name || !price) {
          setStatus("Заполни название и цену.");
          return;
        }

        addBtn.disabled = true;
        setStatus("Загрузка...");

        let imageUrl = "";

        if (file) {
          imageUrl = await uploadImage(file);
        }

        const { error: insertError } = await client
          .from("products")
          .insert([
            {
              name,
              price: Number(price),
              description,
              image_url: imageUrl
            }
          ]);

        if (insertError) {
          throw new Error("Ошибка сохранения товара: " + insertError.message);
        }

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("description").value = "";
        photoInput.value = "";
        previewEl.src = "";
        previewEl.style.display = "none";

        setStatus("✅ Товар добавлен");
        await loadProducts();
      } catch (err) {
        setStatus("❌ " + err.message);
        alert(err.message);
      } finally {
        addBtn.disabled = false;
      }
    }

    async function deleteProduct(id) {
      const ok = confirm("Удалить товар?");
      if (!ok) return;

      const { error } = await client
        .from("products")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Ошибка удаления: " + error.message);
        return;
      }

      loadProducts();
    }

    loadProducts();
  </script>
</body>
</html>
